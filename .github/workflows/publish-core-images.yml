name: Publish Core Images

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - "processing/containers/prodigal/**"
      - "processing/containers/rasttk/**"
      - ".github/workflows/publish-core-images.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/margie

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: prodigal
            context: ./processing/containers/prodigal
            dockerfile: ./processing/containers/prodigal/Dockerfile
            image: prodigal-annotation
          - name: rasttk
            context: ./processing/containers/rasttk
            dockerfile: ./processing/containers/rasttk/Dockerfile
            image: rasttk-annotation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:1.0
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
